<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGVTS Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { padding:20px; background:#f1f5f9; }
.box { max-width:600px; margin:auto; background:white; padding:20px; border-radius:10px; }
</style>
</head>

<body>

<div class="box">
    <h3 class="text-center">TGVTS Parent Portal</h3>

    <input type="text" id="phoneNumber" class="form-control" placeholder="Enter phone number">

    <button onclick="verifyPhone()" class="btn btn-success mt-3 w-100">
        View Results
    </button>

    <div id="error" class="alert alert-danger mt-3" style="display:none;"></div>

    <div id="results" class="mt-3"></div>
</div>

<script src="script.js"></script>

</body>
</html>
