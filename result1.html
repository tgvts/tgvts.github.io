<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Result | Temboni GVTS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <h2 class="text-center mb-4">Student Result Portal</h2>

  <div class="mb-3">
    <label for="parentPhone" class="form-label">Enter Parent Phone Number:</label>
    <input type="text" id="parentPhone" class="form-control" placeholder="e.g., 0712345678">
  </div>

  <!-- Button must have correct ID -->
  <button id="viewResult" class="btn btn-primary mb-4">View Result</button>

  <!-- Container where result will be displayed -->
  <div id="resultContainer" class="mt-4"></div>

  <div class="mt-4">
    <a href="index.html" class="btn btn-secondary">Back to Home</a>
  </div>
</div>

<!-- Make sure script.js is loaded at the end of body -->
<script src="script.js"></script>
</body>
</html>
