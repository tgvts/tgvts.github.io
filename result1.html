<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Parent Portal | Temboni Government Secondary School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .portal-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .portal-header {
            background: linear-gradient(135deg, #075147, #0a5f53);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .school-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd966;
            margin-bottom: 15px;
        }
        .portal-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
        .portal-header p { font-size: 0.85rem; opacity: 0.9; }
        .portal-body { padding: 30px; }
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            border: 2px solid #e2e8f0;
            padding: 4px 6px 4px 20px;
            transition: all 0.3s;
        }
        .phone-input-wrapper:focus-within { border-color: #075147; box-shadow: 0 0 0 3px rgba(7,81,71,0.1); }
        .country-code { font-weight: 600; color: #075147; background: #e6f4f0; padding: 8px 12px; border-radius: 40px; font-size: 0.9rem; }
        .form-control { border: none; background: transparent; padding: 12px 12px; width: 100%; font-size: 1rem; outline: none; }
        .btn-verify {
            background: linear-gradient(135deg, #075147, #0a5f53);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(7,81,71,0.3); }
        .btn-verify:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-admin {
            background: #6c757d;
            margin-top: 10px;
        }
        .btn-admin:hover { background: #5a6268; }
        .alert { border-radius: 20px; padding: 12px 20px; margin-bottom: 20px; }
        .result-card { background: #f8fafc; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; margin-top: 20px; }
        .student-name { font-size: 1.3rem; font-weight: 700; color: #075147; margin-bottom: 5px; }
        .student-detail { color: #475569; font-size: 0.85rem; margin-bottom: 15px; }
        .subject-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .subject-table th { background: #e2e8f0; padding: 12px 8px; text-align: left; font-size: 0.75rem; font-weight: 700; }
        .subject-table td { padding: 10px 8px; border-bottom: 1px solid #e2e8f0; font-size: 0.8rem; }
        .grade-a { color: #166534; font-weight: 700; background: #e8f5e9; }
        .grade-b { color: #1e40af; font-weight: 600; background: #e3f2fd; }
        .grade-c { color: #854d0e; background: #fff8e1; }
        .grade-d { color: #9a3412; background: #fff3e0; }
        .grade-f { color: #991b1b; font-weight: 600; background: #ffebee; }
        .points-badge { background: #075147; color: white; padding: 6px 12px; border-radius: 40px; display: inline-block; font-weight: 600; margin-top: 10px; font-size: 0.75rem; }
        .division-i { background: #166534; color: white; padding: 3px 10px; border-radius: 20px; display: inline-block; font-size: 0.65rem; }
        .division-ii { background: #1e40af; color: white; padding: 3px 10px; border-radius: 20px; display: inline-block; font-size: 0.65rem; }
        .division-iii { background: #854d0e; color: white; padding: 3px 10px; border-radius: 20px; display: inline-block; font-size: 0.65rem; }
        .division-iv { background: #9a3412; color: white; padding: 3px 10px; border-radius: 20px; display: inline-block; font-size: 0.65rem; }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-secondary-custom { background: #e2e8f0; color: #334155; border: none; padding: 10px; border-radius: 40px; width: 100%; cursor: pointer; }
        .form-selector { margin-bottom: 20px; }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .portal-card { box-shadow: none; border: none; }
            .result-card { padding: 10px; }
            @page { size: A4; margin: 0.5cm; }
        }
        @media (max-width: 768px) { 
            .portal-body { padding: 20px; }
            .subject-table th, .subject-table td { padding: 6px 4px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="portal-card">
    <div class="portal-header">
        <img src="photos/nembo8.png" alt="School Logo" class="school-logo" onerror="this.src='https://placehold.co/80x80/075147/white?text=TGVTS'">
        <h2><i class="fas fa-school me-2"></i> Temboni Government Secondary School</h2>
        <p>Parent Portal - Examination Results 2026</p>
    </div>
    
    <div class="portal-body">
        <div id="parentView">
            <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
            <div id="successMessage" class="alert alert-success" style="display: none;"></div>
            
            <div class="form-group">
                <label class="form-label fw-bold">📱 Phone Number</label>
                <div class="phone-input-wrapper">
                    <span class="country-code">+255</span>
                    <input type="tel" id="phoneNumber" class="form-control" placeholder="e.g., 752636637" autocomplete="off">
                </div>
                <small class="text-muted">Enter the 9-digit phone number you registered with the school</small>
            </div>
            
            <button id="viewResultBtn" class="btn-verify">
                <i class="fas fa-search me-2"></i> View Results
            </button>
            
            <a href="admin.html" class="btn-verify btn-admin" style="display: block; text-align: center; text-decoration: none;">
                <i class="fas fa-chalkboard-user me-2"></i> Admin Portal
            </a>
            
            <div id="resultsContainer" style="margin-top: 20px;"></div>
            
            <div class="text-center mt-3 no-print">
                <small class="text-muted"><i class="fas fa-info-circle me-1"></i> Need help? Contact school office: +255 22 123 4567</small>
            </div>
        </div>
    </div>
</div>

<script>
    let allStudentsData = [];
    const allSubjects = ["HTM", "HIST", "GEO", "KISW", "ENG", "PHY", "CHEM", "BIO", "MATH", "BUS", "BK", "EDK"];
    
    const phoneInput = document.getElementById('phoneNumber');
    const viewBtn = document.getElementById('viewResultBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    
    function showError(message) {
        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i> ' + message;
        errorDiv.style.display = 'block';
        successDiv.style.display = 'none';
        setTimeout(() => { errorDiv.style.display = 'none'; }, 8000);
    }
    
    function showSuccess(message) {
        successDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i> ' + message;
        successDiv.style.display = 'block';
        setTimeout(() => { successDiv.style.display = 'none'; }, 3000);
    }
    
    function cleanPhoneNumber(phone) {
        let cleaned = phone.replace(/[^0-9]/g, '');
        if (cleaned.startsWith('255')) cleaned = cleaned.substring(3);
        if (cleaned.startsWith('0')) cleaned = cleaned.substring(1);
        return cleaned;
    }
    
    function getGradeClass(grade) {
        if (grade === 'A') return 'grade-a';
        if (grade === 'B') return 'grade-b';
        if (grade === 'C') return 'grade-c';
        if (grade === 'D') return 'grade-d';
        if (grade === 'F') return 'grade-f';
        return '';
    }
    
    function getDivisionClass(division) {
        if (division === 'I') return 'division-i';
        if (division === 'II') return 'division-ii';
        if (division === 'III') return 'division-iii';
        if (division === 'IV') return 'division-iv';
        return '';
    }
    
    function setLoading(isLoading) {
        if (isLoading) {
            viewBtn.disabled = true;
            viewBtn.innerHTML = '<span class="loading-spinner"></span> Searching...';
        } else {
            viewBtn.disabled = false;
            viewBtn.innerHTML = '<i class="fas fa-search me-2"></i> View Results';
        }
    }
    
    function displayResults(student) {
        let subjectsHtml = '';
        for (let i = 0; i < allSubjects.length; i++) {
            const grade = student.grades[i] || '-';
            const points = student.points[i] || 0;
            const gradeClass = getGradeClass(grade);
            subjectsHtml += '汽水' +
                '汽水<strong>' + allSubjects[i] + '</strong>汽水' +
                '<td class="' + gradeClass + ' text-center"><strong>' + grade + '</strong>汽水' +
                '<td class="text-center">' + points + '汽水' +
                '汽水';
        }
        
        let divisionClass = getDivisionClass(student.division);
        let divisionText = '';
        if (student.division === 'I') divisionText = '🏆 Division I (Excellent)';
        else if (student.division === 'II') divisionText = '🥈 Division II (Very Good)';
        else if (student.division === 'III') divisionText = '🥉 Division III (Good)';
        else if (student.division === 'IV') divisionText = '📘 Division IV (Satisfactory)';
        else if (student.division === '0') divisionText = '⭕ Division 0 (Needs Improvement)';
        else if (student.division === 'ABS') divisionText = '🚫 Absent';
        else divisionText = '⚠️ Incomplete';
        
        const html = '<div class="result-card">' +
            '<div class="student-name"><i class="fas fa-user-graduate me-2"></i> ' + student.name + '</div>' +
            '<div class="student-detail">' +
            '<i class="fas fa-id-card me-1"></i> Candidate: ' + (student.candidate || '-') + ' | ' +
            '<i class="fas fa-graduation-cap me-1"></i> ' + student.form + ' | ' +
            '<i class="fas fa-venus-mars me-1"></i> ' + (student.sex === 'M' ? 'Male' : 'Female') +
            '</div>' +
            '<div class="student-detail"><i class="fas fa-user me-1"></i> Parent/Guardian: ' + student.parent + '</div>' +
            '<div style="background:#eef2ff;padding:12px;border-radius:16px;margin:12px 0;">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">' +
            '<div><span style="font-size:0.7rem;color:#475569;">TOTAL POINTS</span><div style="font-size:1.8rem;font-weight:800;color:#075147;">' + student.totalPoints + '</div></div>' +
            '<div><span style="font-size:0.7rem;color:#475569;">DIVISION</span><div><span class="' + divisionClass + '">' + student.division + '</span></div><div style="font-size:0.65rem;">' + divisionText + '</div></div>' +
            '</div></div>' +
            '<div><h6 style="font-weight:700;margin-bottom:10px;"><i class="fas fa-book-open me-2"></i> Subject Performance</h6>' +
            '<div class="table-responsive"><table class="subject-table"><thead>汽水<th style="width:40%">Subject</th><th style="width:30%">Grade</th><th style="width:30%">Points</th> </thead><tbody>' +
            subjectsHtml +
            '</tbody>  </table</div></div>' +
            '<div class="points-badge"><i class="fas fa-chart-simple me-1"></i> Total Points: ' + student.totalPoints + ' | Division: ' + student.division + '</div>' +
            '<div class="text-center mt-3 no-print"><button class="btn-secondary-custom" onclick="window.print()"><i class="fas fa-print me-2"></i> Print Results</button></div>' +
            '</div>';
        
        resultsContainer.innerHTML = html;
    }
    
    function verifyPhone() {
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        resultsContainer.innerHTML = '';
        
        const phone = phoneInput.value.trim();
        if (!phone) { showError('Please enter your phone number'); return; }
        
        let cleanedPhone = cleanPhoneNumber(phone);
        if (cleanedPhone.length < 9) { showError('Please enter a valid phone number (at least 9 digits)'); return; }
        
        setLoading(true);
        
        setTimeout(() => {
            let foundStudent = null;
            for (let i = 0; i < allStudentsData.length; i++) {
                if (allStudentsData[i].phone === cleanedPhone) {
                    foundStudent = allStudentsData[i];
                    break;
                }
            }
            setLoading(false);
            
            if (foundStudent) {
                displayResults(foundStudent);
                showSuccess('Results found for ' + foundStudent.name + ' (' + foundStudent.form + ')');
            } else {
                let availableNumbers = '';
                for (let i = 0; i < allStudentsData.length; i++) {
                    availableNumbers += '<strong>' + allStudentsData[i].phone + '</strong> - ' + allStudentsData[i].name + ' (' + allStudentsData[i].form + ')<br>';
                }
                showError('Phone number "' + phone + '" not found.<br><br><strong>Available phone numbers:</strong><br>' + availableNumbers);
            }
        }, 300);
    }
    
    // Load all form data
    function loadAllData() {
        const forms = [
            { file: 'students_form1.json', form: 'Form One' },
            { file: 'students_form2.json', form: 'Form Two' },
            { file: 'students_form3.json', form: 'Form Three' },
            { file: 'students_form4.json', form: 'Form Four' }
        ];
        
        let loadedCount = 0;
        
        forms.forEach(form => {
            fetch(form.file)
                .then(response => response.json())
                .then(data => {
                    allStudentsData.push(...data);
                    loadedCount++;
                    if (loadedCount === forms.length) {
                        showSuccess('✅ System ready! ' + allStudentsData.length + ' students loaded across all forms. Enter a phone number to search.');
                    }
                })
                .catch(err => {
                    console.warn('Could not load ' + form.file);
                    loadedCount++;
                    if (loadedCount === forms.length) {
                        if (allStudentsData.length === 0) {
                            showError('No student data found. Please ensure JSON files exist.');
                        } else {
                            showSuccess('✅ System ready! ' + allStudentsData.length + ' students loaded.');
                        }
                    }
                });
        });
    }
    
    loadAllData();
    
    viewBtn.addEventListener('click', verifyPhone);
    phoneInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') verifyPhone(); });
    window.verifyPhone = verifyPhone;
</script>
</body>
</html>
