<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGVTS Parent Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f1f5f9; padding:20px; font-family: Arial; }
.portal { max-width:800px; margin:auto; background:white; padding:20px; border-radius:10px; }
.grade-a { color:green; font-weight:bold; }
.grade-b { color:blue; }
.grade-c { color:orange; }
.grade-d { color:brown; }
.grade-f { color:red; }
</style>
</head>

<body>

<div class="portal">
    <h3 class="text-center">Temboni Government Secondary School</h3>
    <p class="text-center">Parent Portal</p>

    <label>Phone Number</label>
    <input type="text" id="phoneNumber" class="form-control" placeholder="Enter phone">

    <button class="btn btn-success mt-3 w-100" onclick="verifyPhone()">
        View Results
    </button>

    <div id="error" class="alert alert-danger mt-3" style="display:none;"></div>

    <div id="results" class="mt-3"></div>
</div>

<!-- IMPORTANT: script must be at bottom -->
<script src="./script.js"></script>

</body>
</html>
