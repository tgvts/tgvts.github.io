<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result | Temboni Government Secondary School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .portal-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .portal-header {
            background: linear-gradient(135deg, #075147, #0a5f53);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .school-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd966;
            margin-bottom: 15px;
        }
        .portal-body { padding: 30px; }
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            border: 2px solid #e2e8f0;
            padding: 4px 6px 4px 20px;
        }
        .phone-input-wrapper:focus-within {
            border-color: #075147;
            box-shadow: 0 0 0 3px rgba(7,81,71,0.1);
        }
        .country-code { font-weight: 600; color: #075147; background: #e6f4f0; padding: 8px 12px; border-radius: 40px; }
        .form-control { border: none; background: transparent; padding: 12px; width: 100%; outline: none; }
        .btn-verify {
            background: linear-gradient(135deg, #075147, #0a5f53);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(7,81,71,0.3); }
        .result-card { background: #f8fafc; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; }
        .alert { border-radius: 20px; }
        @media (max-width: 768px) { .portal-body { padding: 20px; } }
    </style>
</head>
<body>

<div class="portal-card">
    <div class="portal-header">
        <img src="photos/nembo8.png" alt="School Logo" class="school-logo" onerror="this.src='https://placehold.co/80x80/075147/white?text=TGVTS'">
        <h2><i class="fas fa-school me-2"></i> Temboni Government Secondary School</h2>
        <p>Parent Portal - Examination Results 2026</p>
    </div>
    
    <div class="portal-body">
        <div class="text-center mb-4">
            <i class="fas fa-phone-alt fa-3x text-success mb-3"></i>
            <h4>Find Your Child's Results</h4>
            <p class="text-muted">Enter the phone number you registered with the school</p>
        </div>
        
        <div id="loginError" class="alert alert-danger" style="display: none;"></div>
        
        <div class="form-group">
            <label class="form-label fw-bold">📱 Phone Number</label>
            <div class="phone-input-wrapper">
                <span class="country-code">+255</span>
                <input type="tel" id="parentPhone" class="form-control" placeholder="e.g., 752636637" autocomplete="off">
            </div>
            <small class="text-muted">Enter the 9-digit phone number you registered with the school</small>
        </div>
        
        <button class="btn-verify" onclick="verifyPhone()">
            <i class="fas fa-search me-2"></i> View Results
        </button>
        
        <div id="resultContainer" class="mt-4"></div>
        
        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-outline-secondary"><i class="fas fa-home me-2"></i> Back to Home</a>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
