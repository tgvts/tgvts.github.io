<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TGVTS Student Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f5f5; }
    mark { background-color: yellow; color: black; }
  </style>
</head>
<body>

<div class="container my-4">
  <h1 class="text-center mb-4">TGVTS FORM ONE STUDENTS RESULTS</h1>

  <!-- Download PDF Button -->
  <div class="text-center mb-3">
    <button class="btn btn-success" onclick="downloadPDF()">Download PDF</button>
  </div>

  <!-- Search Box -->
  <div class="mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Search student name..." onkeyup="filterTable()">
  </div>

  <!-- Results Table -->
  <div class="table-responsive">
    <table id="resultsTable" class="table table-striped table-bordered table-hover">
      <thead class="table-primary">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Form</th>
          <th>Math</th>
          <th>English</th>
          <th>Science</th>
          <th>History</th>
          <th>Geography</th>
          <th>Biology</th>
          <th>Chemistry</th>
          <th>Physics</th>
          <th>Computer</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <!-- Sample Form One Students -->
        <tr>
          <td>1</td><td>Mary</td><td>Form One</td>
          <td>85</td><td>90</td><td>88</td><td>80</td><td>75</td><td>82</td><td>78</td><td>89</td><td>92</td><td>839</td>
        </tr>
        <tr>
          <td>2</td><td>Faith</td><td>Form One</td>
          <td>88</td><td>90</td><td>85</td><td>82</td><td>80</td><td>86</td><td>84</td><td>87</td><td>91</td><td>853</td>
        </tr>
        <!-- Paste your remaining 500 students here -->
      </tbody>
    </table>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
  // Filter table by name and form
  function filterTable() {
    const searchValue = document.getElementById("searchInput").value.toLowerCase();
    const selectedForm = document.getElementById("formSelect").value.toLowerCase();
    const table = document.getElementById("resultsTable");
    const rows = table.getElementsByTagName("tr");

    for (let i = 1; i < rows.length; i++) {
      const nameCell = rows[i].getElementsByTagName("td")[1];
      const formCell = rows[i].getElementsByTagName("td")[2];
      const nameText = nameCell.textContent;

      const matchesForm = selectedForm === "all" || formCell.textContent.toLowerCase() === selectedForm;
      const matchesSearch = nameText.toLowerCase().includes(searchValue);

      if (matchesForm && matchesSearch) {
        rows[i].style.display = "";
        if(searchValue){
          const regex = new RegExp(`(${searchValue})`, "gi");
          nameCell.innerHTML = nameText.replace(regex, "<mark>$1</mark>");
        } else {
          nameCell.innerHTML = nameText;
        }
      } else {
        rows[i].style.display = "none";
      }
    }
  }

  // Download table as PDF with title
  function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'pt', 'a4'); // landscape

    // PDF title
    const title = "TGVTS FORM ONE STUDENT RESULTS";
    doc.setFontSize(18);
    doc.text(title, doc.internal.pageSize.getWidth() / 2, 30, { align: "center" });

    // Collect table data
    const table = document.getElementById("resultsTable");
    const headers = [];
    table.querySelectorAll("thead th").forEach(th => headers.push(th.innerText));
    const data = [];
    table.querySelectorAll("tbody tr").forEach(tr => {
      const row = [];
      tr.querySelectorAll("td").forEach(td => row.push(td.innerText));
      data.push(row);
    });

    // Generate table below the title
    doc.autoTable({
      head: [headers],
      body: data,
      startY: 50, // space after title
      styles: { fontSize: 8 },
      headStyles: { fillColor: [0, 102, 204] }, // Bootstrap blue header
    });

    doc.save("TGVTS_form 0oe 2026 Results.pdf");
  }
</script>

</body>
</html>
