<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Force desktop width -->
  <meta name="viewport"  initial-scale=1">
  <title>TGVTS Form One Student Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { 
      background-color: #f5f5f5; 
      min-width: 1024px; /* ensures layout stays at desktop width */
    }
    mark { background-color: yellow; color: black; }
    .table-responsive { overflow-x: auto; } /* allow horizontal scroll if needed */
  </style>
</head>
<body>

<div class="container my-4">
  <h1 class="text-center mb-4">TGVTS FORM ONE STUDENT RESULTS</h1>

  <!-- Download PDF Button -->
  <div class="text-center mb-3">
    <button class="btn btn-success" onclick="downloadPDF()">Download PDF</button>
  </div>

  <!-- Search Box -->
  <div class="mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Search any column..." onkeyup="filterTable()">
  </div>

  <!-- Results Table -->
  <div class="table-responsive">
    <table id="resultsTable" class="table table-striped table-bordered table-hover">
      <thead class="table-primary">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Math</th>
          <th>English</th>
          <th>Science</th>
          <th>History</th>
          <th>Geography</th>
          <th>Biology</th>
          <th>Chemistry</th>
          <th>Physics</th>
          <th>Computer</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td><td>Mary</td>
          <td>85</td><td>90</td><td>88</td><td>80</td><td>75</td><td>82</td><td>78</td><td>89</td><td>92</td><td>839</td>
        </tr>
        <tr>
          <td>2</td><td>Faith</td>
          <td>88</td><td>90</td><td>85</td><td>82</td><td>80</td><td>86</td><td>84</td><td>87</td><td>91</td><td>853</td>
        </tr>
        <!-- Add all other students here -->
      </tbody>
    </table>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
  // Improved search across all columns
  function filterTable() {
    const searchValue = document.getElementById("searchInput").value.toLowerCase();
    const table = document.getElementById("resultsTable");
    const rows = table.getElementsByTagName("tr");

    for (let i = 1; i < rows.length; i++) {
      let row = rows[i];
      let cells = row.getElementsByTagName("td");
      let matchFound = false;

      // Check each cell
      for (let j = 0; j < cells.length; j++) {
        const cellText = cells[j].textContent;
        if (cellText.toLowerCase().includes(searchValue)) {
          matchFound = true;
        }
      }

      // Show or hide row and highlight matches
      if (matchFound || searchValue === "") {
        row.style.display = "";
        for (let j = 0; j < cells.length; j++) {
          const cellText = cells[j].textContent;
          if(searchValue){
            const regex = new RegExp(`(${searchValue})`, "gi");
            cells[j].innerHTML = cellText.replace(regex, "<mark>$1</mark>");
          } else {
            cells[j].innerHTML = cellText;
          }
        }
      } else {
        row.style.display = "none";
      }
    }
  }

  // Download table as PDF with title
  function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'pt', 'a4');

    const title = "TGVTS FORM ONE STUDENT RESULTS 2026";
    doc.setFontSize(18);
    doc.text(title, doc.internal.pageSize.getWidth() / 2, 30, { align: "center" });

    const table = document.getElementById("resultsTable");
    const headers = [];
    table.querySelectorAll("thead th").forEach(th => headers.push(th.innerText));
    const data = [];
    table.querySelectorAll("tbody tr").forEach(tr => {
      const row = [];
      tr.querySelectorAll("td").forEach(td => row.push(td.innerText));
      data.push(row);
    });

    doc.autoTable({
      head: [headers],
      body: data,
      startY: 50,
      styles: { fontSize: 8 },
      headStyles: { fillColor: [0, 102, 204] },
    });

    doc.save("TGVTS_Form_One_2026_Results.pdf");
  }
</script>

</body>
</html>
