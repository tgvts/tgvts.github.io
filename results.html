<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TGVTS Form One Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    mark { background-color: yellow; color: black; }
  </style>
</head>
<body class="bg-light">

<div class="container my-4">
  <h1 class="text-center mb-4">TGVTS Form One Results</h1>

  <!-- Search Box -->
  <div class="mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Search student name..." onkeyup="filterTable()">
  </div>

  <!-- Form One Results Table -->
  <div class="table-responsive">
    <table id="resultsTable" class="table table-striped table-bordered table-hover">
      <thead class="table-primary">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Math</th>
          <th>English</th>
          <th>Science</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>1</td><td>Mary</td><td>85</td><td>90</td><td>88</td><td>263</td></tr>
        <tr><td>2</td><td>Faith</td><td>88</td><td>90</td><td>85</td><td>263</td></tr>
        <tr><td>3</td><td>Peter</td><td>78</td><td>82</td><td>80</td><td>240</td></tr>
        <tr><td>4</td><td>Grace</td><td>92</td><td>88</td><td>95</td><td>275</td></tr>
        <!-- Add more Form One students here -->
      </tbody>
    </table>
  </div>
</div>

<script>
function filterTable() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const rows = document.getElementById("resultsTable").getElementsByTagName("tr");

  for (let i = 1; i < rows.length; i++) { // skip header
    const nameCell = rows[i].getElementsByTagName("td")[1];
    const nameText = nameCell.textContent;

    if(nameText.toLowerCase().includes(input)){
      rows[i].style.display = "";
      const regex = new RegExp(`(${input})`, "gi");
      nameCell.innerHTML = nameText.replace(regex, "<mark>$1</mark>");
    } else {
      rows[i].style.display = "none";
    }
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
