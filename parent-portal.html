<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal | Temboni Secondary School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; padding: 20px; font-family: Arial, sans-serif; }
        .card { max-width: 1000px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; }
        .header { background: #075147; color: white; padding: 25px; text-align: center; }
        .logo { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #ffd966; margin-bottom: 10px; }
        .body { padding: 25px; }
        .phone-box { display: flex; background: #f1f5f9; border-radius: 50px; border: 1px solid #ddd; padding: 5px 15px; }
        .phone-box input { border: none; background: none; padding: 12px; width: 100%; outline: none; font-size: 16px; }
        .btn { background: #075147; color: white; border: none; padding: 12px; border-radius: 50px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #0a5f53; }
        .result { background: #f8fafc; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #ddd; }
        .student-name { font-size: 20px; font-weight: bold; color: #075147; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #e2e8f0; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #ddd; }
        .grade-A { background: #dcfce7; color: #166534; font-weight: bold; }
        .grade-B { background: #dbeafe; color: #1e40af; font-weight: bold; }
        .grade-C { background: #fef9c3; color: #854d0e; }
        .grade-D { background: #ffedd5; color: #9a3412; }
        .grade-F { background: #fee2e2; color: #991b1b; font-weight: bold; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; color: white; font-size: 12px; }
        .badge-I { background: #166534; }
        .badge-II { background: #1e40af; }
        .badge-III { background: #854d0e; }
        .badge-IV { background: #9a3412; }
        .alert { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .table-wrapper { overflow-x: auto; max-height: 500px; overflow-y: auto; }
        
        /* PRINT STYLES - Hide everything except results */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .card {
                box-shadow: none;
                border: none;
                border-radius: 0;
                max-width: 100%;
            }
            .header {
                display: none !important;
            }
            .logo {
                display: none !important;
            }
            .phone-box {
                display: none !important;
            }
            .btn {
                display: none !important;
            }
            .alert {
                display: none !important;
            }
            .no-print {
                display: none !important;
            }
            .admin-link {
                display: none !important;
            }
            .result {
                padding: 0;
                margin: 0;
                border: none;
                background: white;
            }
            .result-card {
                padding: 0;
                margin: 0;
            }
            .student-name {
                font-size: 18px;
                margin-top: 10px;
            }
            table {
                page-break-inside: avoid;
            }
            th, td {
                padding: 5px;
            }
            @page {
                size: A4;
                margin: 1cm;
            }
        }
        
        @media (max-width: 600px) { .body { padding: 15px; } table { font-size: 11px; } th, td { padding: 4px; } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="photos/nembo8.png" class="logo" onerror="this.src='https://placehold.co/70x70/075147/white?text=TGVTS'">
        <h2>Parent Portal</h2>
        <p>Enter your phone number to see results</p>
    </div>
    <div class="body">
        <div id="errorMsg" class="alert" style="display: none;"></div>
        
        <div class="phone-box">
            <span style="background:#e6f4f0; padding:8px 12px; border-radius:40px; color:#075147;">+255</span>
            <input type="tel" id="phoneNumber" placeholder="e.g., 752636637">
        </div>
        
        <button class="btn" onclick="searchStudent()">View Results</button>
        
        <div id="resultArea"></div>
        
        <div style="text-align:center; margin-top:15px;">
            <a href="admin.html" style="color:#6c757d;">Admin Portal</a>
        </div>
    </div>
</div>

<script>
    let allStudents = [];
    
    const subjectsForm1and2 = [
        "Chemistry", "Kiswahili", "Book Keeping", "Physics", "History", "Biology",
        "Mathematics", "English Language", "Geography", "Business Studies",
        "Elimu ya Dini ya Kiislam", "History of Tanzania & Civics"
    ];
    
    const subjectsForm3and4 = [
        "Chemistry", "Kiswahili", "Book Keeping", "Physics", "History", "Biology",
        "Mathematics", "English Language", "Geography", "Literature in English",
        "Elimu ya Dini ya Kiislam", "Civics", "Commerce"
    ];
    
    function getSubjectsForForm(form) {
        if (form === 'Form One' || form === 'Form Two') {
            return subjectsForm1and2;
        } else {
            return subjectsForm3and4;
        }
    }
    
    function loadAllData() {
        let files = ['students_form1.json', 'students_form2.json', 'students_form3.json', 'students_form4.json'];
        let loaded = 0;
        
        files.forEach(file => {
            fetch(file)
                .then(res => res.json())
                .then(data => {
                    allStudents.push(...data);
                    loaded++;
                    if (loaded === files.length) {
                        let msgDiv = document.getElementById('errorMsg');
                        msgDiv.innerHTML = '✅ Ready! ' + allStudents.length + ' students loaded.';
                        msgDiv.style.background = '#d4edda';
                        msgDiv.style.color = '#155724';
                        msgDiv.style.display = 'block';
                        setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
                    }
                })
                .catch(err => console.log('Could not load', file));
        });
    }
    
    function cleanPhone(phone) {
        let p = phone.replace(/[^0-9]/g, '');
        if (p.startsWith('255')) p = p.substring(3);
        if (p.startsWith('0')) p = p.substring(1);
        return p;
    }
    
    function getGradeClass(grade) {
        if (grade === 'A') return 'grade-A';
        if (grade === 'B') return 'grade-B';
        if (grade === 'C') return 'grade-C';
        if (grade === 'D') return 'grade-D';
        if (grade === 'F') return 'grade-F';
        return '';
    }
    
    function searchStudent() {
        let phone = document.getElementById('phoneNumber').value;
        let errorDiv = document.getElementById('errorMsg');
        let resultDiv = document.getElementById('resultArea');
        
        errorDiv.style.display = 'none';
        resultDiv.innerHTML = '';
        
        if (!phone) {
            errorDiv.innerHTML = 'Please enter your phone number';
            errorDiv.style.display = 'block';
            return;
        }
        
        let cleanPhoneNum = cleanPhone(phone);
        if (cleanPhoneNum.length < 9) {
            errorDiv.innerHTML = 'Please enter a valid phone number (9 digits)';
            errorDiv.style.display = 'block';
            return;
        }
        
        let student = null;
        for (let i = 0; i < allStudents.length; i++) {
            if (allStudents[i].phone === cleanPhoneNum) {
                student = allStudents[i];
                break;
            }
        }
        
        if (!student) {
            let list = '';
            for (let i = 0; i < allStudents.length; i++) {
                list += allStudents[i].phone + ' - ' + allStudents[i].name + ' (' + allStudents[i].form + ')<br>';
            }
            errorDiv.innerHTML = 'Phone number not found.<br><br><strong>Available numbers:</strong><br>' + list;
            errorDiv.style.display = 'block';
            return;
        }
        
        let subjects = getSubjectsForForm(student.form);
        
        let gradesHtml = '';
        for (let i = 0; i < subjects.length; i++) {
            let grade = student.grades[i] || '-';
            let points = student.points[i] || 0;
            let gradeClass = getGradeClass(grade);
            
            gradesHtml += '汽水' +
                '汽水<strong>' + subjects[i] + '</strong>汽水' +
                '<td class="' + gradeClass + '"><strong>' + grade + '</strong>汽水' +
                '<td class="text-center">' + points + '汽水' +
                '汽水';
        }
        
        let divisionBadge = '';
        if (student.division === 'I') divisionBadge = '<span class="badge badge-I">Division I</span>';
        else if (student.division === 'II') divisionBadge = '<span class="badge badge-II">Division II</span>';
        else if (student.division === 'III') divisionBadge = '<span class="badge badge-III">Division III</span>';
        else if (student.division === 'IV') divisionBadge = '<span class="badge badge-IV">Division IV</span>';
        else divisionBadge = '<span class="badge" style="background:#6c757d;">' + student.division + '</span>';
        
        let divisionText = '';
        if (student.division === 'I') divisionText = '🏆 Excellent';
        else if (student.division === 'II') divisionText = '🥈 Very Good';
        else if (student.division === 'III') divisionText = '🥉 Good';
        else if (student.division === 'IV') divisionText = '📘 Satisfactory';
        else if (student.division === '0') divisionText = '⭕ Needs Improvement';
        else if (student.division === 'ABS') divisionText = '🚫 Absent';
        else divisionText = '⚠️ Incomplete';
        
        let html = '<div class="result">' +
            '<div class="student-name">' + student.name + '</div>' +
            '<div style="margin-top:5px; color:#666;">Candidate: ' + student.candidate + ' | ' + student.form + ' | ' + (student.sex === 'M' ? 'Male' : 'Female') + '</div>' +
            '<div style="margin-bottom:10px;">Parent: ' + student.parent + '</div>' +
            '<div style="background:#eef2ff; padding:12px; border-radius:12px; margin:10px 0;">' +
            '<div style="display:flex; justify-content:space-between; flex-wrap:wrap;">' +
            '<div><small>Total Points</small><div style="font-size:24px; font-weight:bold; color:#075147;">' + student.totalPoints + '</div></div>' +
            '<div><small>Division</small><div>' + divisionBadge + '</div><small>' + divisionText + '</small></div>' +
            '</div></div>' +
            '<h6>Subject Performance</h6>' +
            '<div class="table-wrapper"><table class="table table-bordered"><thead>汽水<th>Subject</th><th>Grade</th><th>Points</th> </thead><tbody>' +
            gradesHtml +
            '</tbody> </table</div>' +
            '<div class="no-print" style="text-align:center; margin-top:15px;">' +
            '<button onclick="window.print()" style="background:#e2e8f0; border:none; padding:8px 20px; border-radius:40px; cursor:pointer;">📄 Print Results</button>' +
            '</div>' +
            '</div>';
        
        resultDiv.innerHTML = html;
    }
    
    loadAllData();
</script>
</body>
</html>
