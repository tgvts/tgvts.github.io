<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal | Temboni Secondary School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; padding: 20px; font-family: Arial, sans-serif; }
        .card { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; }
        .header { background: #075147; color: white; padding: 25px; text-align: center; }
        .logo { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #ffd966; margin-bottom: 10px; }
        .body { padding: 25px; }
        .phone-box { display: flex; background: #f1f5f9; border-radius: 50px; border: 1px solid #ddd; padding: 5px 15px; }
        .phone-box input { border: none; background: none; padding: 12px; width: 100%; outline: none; font-size: 16px; }
        .btn { background: #075147; color: white; border: none; padding: 12px; border-radius: 50px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #0a5f53; }
        .result { background: #f8fafc; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #ddd; }
        .student-name { font-size: 20px; font-weight: bold; color: #075147; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #e2e8f0; padding: 8px; text-align: left; }
        td { padding: 6px; border-bottom: 1px solid #ddd; }
        .grade-A { background: #dcfce7; color: #166534; font-weight: bold; }
        .grade-B { background: #dbeafe; color: #1e40af; font-weight: bold; }
        .grade-C { background: #fef9c3; color: #854d0e; }
        .grade-D { background: #ffedd5; color: #9a3412; }
        .grade-F { background: #fee2e2; color: #991b1b; font-weight: bold; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; color: white; font-size: 12px; }
        .badge-I { background: #166534; }
        .badge-II { background: #1e40af; }
        .alert { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        @media (max-width: 600px) { .body { padding: 15px; } table { font-size: 11px; } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="photos/nembo8.png" class="logo" onerror="this.src='https://placehold.co/70x70/075147/white?text=TGVTS'">
        <h2>Parent Portal</h2>
        <p>Enter your phone number to see results</p>
    </div>
    <div class="body">
        <div id="errorMsg" class="alert" style="display: none;"></div>
        
        <div class="phone-box">
            <span style="background:#e6f4f0; padding:8px 12px; border-radius:40px; color:#075147;">+255</span>
            <input type="tel" id="phoneNumber" placeholder="e.g., 752636637">
        </div>
        
        <button class="btn" onclick="searchStudent()">View Results</button>
        
        <div id="resultArea"></div>
        
        <div style="text-align:center; margin-top:15px;">
            <a href="admin.html" style="color:#6c757d;">Admin Portal</a>
        </div>
    </div>
</div>

<script>
    let allStudents = [];
    const subjects = ["HTM", "HIST", "GEO", "KISW", "ENG", "PHY", "CHEM", "BIO", "MATH", "BUS", "BK", "EDK"];
    
    function loadAllData() {
        let files = ['students_form1.json', 'students_form2.json', 'students_form3.json', 'students_form4.json'];
        let loaded = 0;
        
        files.forEach(file => {
            fetch(file)
                .then(res => res.json())
                .then(data => {
                    allStudents.push(...data);
                    loaded++;
                    if (loaded === files.length) {
                        document.getElementById('errorMsg').innerHTML = '✅ Ready! ' + allStudents.length + ' students loaded.';
                        document.getElementById('errorMsg').style.background = '#d4edda';
                        document.getElementById('errorMsg').style.color = '#155724';
                        document.getElementById('errorMsg').style.display = 'block';
                        setTimeout(() => { document.getElementById('errorMsg').style.display = 'none'; }, 3000);
                    }
                })
                .catch(err => console.log('Could not load', file));
        });
    }
    
    function cleanPhone(phone) {
        let p = phone.replace(/[^0-9]/g, '');
        if (p.startsWith('255')) p = p.substring(3);
        if (p.startsWith('0')) p = p.substring(1);
        return p;
    }
    
    function getGradeClass(grade) {
        if (grade === 'A') return 'grade-A';
        if (grade === 'B') return 'grade-B';
        if (grade === 'C') return 'grade-C';
        if (grade === 'D') return 'grade-D';
        if (grade === 'F') return 'grade-F';
        return '';
    }
    
    function searchStudent() {
        let phone = document.getElementById('phoneNumber').value;
        let errorDiv = document.getElementById('errorMsg');
        let resultDiv = document.getElementById('resultArea');
        
        errorDiv.style.display = 'none';
        resultDiv.innerHTML = '';
        
        if (!phone) {
            errorDiv.innerHTML = 'Please enter your phone number';
            errorDiv.style.display = 'block';
            return;
        }
        
        let cleanPhoneNum = cleanPhone(phone);
        if (cleanPhoneNum.length < 9) {
            errorDiv.innerHTML = 'Please enter a valid phone number';
            errorDiv.style.display = 'block';
            return;
        }
        
        let student = null;
        for (let i = 0; i < allStudents.length; i++) {
            if (allStudents[i].phone === cleanPhoneNum) {
                student = allStudents[i];
                break;
            }
        }
        
        if (!student) {
            let list = '';
            for (let i = 0; i < allStudents.length; i++) {
                list += allStudents[i].phone + ' - ' + allStudents[i].name + '<br>';
            }
            errorDiv.innerHTML = 'Phone number not found.<br><br><strong>Available numbers:</strong><br>' + list;
            errorDiv.style.display = 'block';
            return;
        }
        
        // Show results
        let gradesHtml = '';
        for (let i = 0; i < subjects.length; i++) {
            let grade = student.grades[i] || '-';
            let points = student.points[i] || 0;
            let gradeClass = getGradeClass(grade);
            gradesHtml += '<tr><td><strong>' + subjects[i] + '</strong></td><td class="' + gradeClass + '"><strong>' + grade + '</strong></td><td>' + points + '</td></tr>';
        }
        
        let divisionBadge = '';
        if (student.division === 'I') divisionBadge = '<span class="badge badge-I">Division I</span>';
        else if (student.division === 'II') divisionBadge = '<span class="badge badge-II">Division II</span>';
        else divisionBadge = '<span class="badge" style="background:#6c757d;">' + student.division + '</span>';
        
        let html = '<div class="result">' +
            '<div class="student-name">' + student.name + '</div>' +
            '<div style="margin-top:5px; color:#666;">Candidate: ' + student.candidate + ' | ' + student.form + ' | ' + (student.sex === 'M' ? 'Male' : 'Female') + '</div>' +
            '<div style="margin-bottom:10px;">Parent: ' + student.parent + '</div>' +
            '<div style="background:#eef2ff; padding:12px; border-radius:12px; margin:10px 0;">' +
            '<div style="display:flex; justify-content:space-between;">' +
            '<div><small>Total Points</small><div style="font-size:24px; font-weight:bold; color:#075147;">' + student.totalPoints + '</div></div>' +
            '<div><small>Division</small><div>' + divisionBadge + '</div></div>' +
            '</div></div>' +
            '<h6>Subject Performance</h6>' +
            '<table><thead><tr><th>Subject</th><th>Grade</th><th>Points</th></tr></thead><tbody>' + gradesHtml + '</tbody></table>' +
            '<button onclick="window.print()" style="margin-top:15px; background:#e2e8f0; border:none; padding:8px; border-radius:40px; width:100%; cursor:pointer;">Print Results</button>' +
            '</div>';
        
        resultDiv.innerHTML = html;
    }
    
    loadAllData();
</script>
</body>
</html>
